<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sentinel - Sign In</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #f8f9fa;
        color: #111827;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 40px 32px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      }

      h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 8px;
        text-align: center;
      }

      .subtitle {
        font-size: 14px;
        color: #6b7280;
        text-align: center;
        margin-bottom: 28px;
        line-height: 1.5;
      }

      .success-banner {
        background: #ecfdf5;
        border: 1px solid #a7f3d0;
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 20px;
        font-size: 14px;
        color: #065f46;
        text-align: center;
        display: none;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #374151;
        margin-bottom: 6px;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper input {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
        background: #fff;
      }

      .input-wrapper input:focus {
        border-color: #111827;
        box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.08);
      }

      .input-wrapper input::placeholder {
        color: #9ca3af;
      }

      .toggle-password {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        color: #9ca3af;
        display: flex;
        align-items: center;
      }

      .toggle-password:hover {
        color: #6b7280;
      }

      .toggle-password svg {
        width: 20px;
        height: 20px;
      }

      .input-wrapper.has-toggle input {
        padding-right: 44px;
      }

      .btn-primary {
        width: 100%;
        background: #111827;
        color: #ffffff;
        border: none;
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        margin-top: 4px;
      }

      .btn-primary:hover {
        background: #1f2937;
      }

      .btn-primary:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 20px 0;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e5e7eb;
      }

      .divider span {
        font-size: 12px;
        color: #9ca3af;
        text-transform: uppercase;
      }

      .btn-google {
        width: 100%;
        background: #ffffff;
        color: #374151;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: background-color 0.2s, border-color 0.2s;
      }

      .btn-google:hover {
        background: #f9fafb;
        border-color: #9ca3af;
      }

      .btn-google svg {
        width: 18px;
        height: 18px;
      }

      .links {
        text-align: center;
        margin-top: 20px;
      }

      .links a {
        font-size: 14px;
        color: #6b7280;
        text-decoration: none;
        transition: color 0.2s;
      }

      .links a:hover {
        color: #111827;
      }

      .links .signup-link {
        display: block;
        margin-top: 12px;
        font-size: 14px;
        color: #6b7280;
      }

      .links .signup-link a {
        color: #111827;
        font-weight: 600;
      }

      .error-msg {
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 16px;
        font-size: 13px;
        color: #991b1b;
        display: none;
        text-align: center;
      }

      .status-msg {
        text-align: center;
        font-size: 13px;
        color: #6b7280;
        margin-top: 12px;
        display: none;
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid #d1d5db;
        border-top: 2px solid #111827;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sign in</h1>
      <p class="subtitle">Enter your email below to sign in to your account</p>

      <div class="success-banner" id="success-banner">
        Account created successfully! Please sign in.
      </div>

      <div class="error-msg" id="error-msg"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper has-toggle">
          <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="toggle-password" id="toggle-password" aria-label="Toggle password visibility">
            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-primary" id="sign-in-btn">Sign in</button>

      <div class="divider"><span>or</span></div>

      <button class="btn-google" id="google-btn">
        <svg viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>

      <div class="links">
        <a href="#" id="forgot-password-link">Forgot your password?</a>
        <div class="signup-link">
          Don't have an account? <a href="#" id="signup-link">Sign up</a>
        </div>
      </div>

      <div class="status-msg" id="status-msg"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://cxoizjoeozrtjpybgicc.supabase.co"
      const SUPABASE_ANON_KEY = "6EB4753E-E919-4691-B6E4-65A6B6E38A04"
      const API_BASE_URL = "https://whale-app-ae67c.ondigitalocean.app"

      const params = new URLSearchParams(window.location.search)
      const state = params.get("state")
      const registered = params.get("registered")

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

      // DOM elements
      const emailInput = document.getElementById("email")
      const passwordInput = document.getElementById("password")
      const signInBtn = document.getElementById("sign-in-btn")
      const googleBtn = document.getElementById("google-btn")
      const errorMsg = document.getElementById("error-msg")
      const statusMsg = document.getElementById("status-msg")
      const successBanner = document.getElementById("success-banner")
      const togglePasswordBtn = document.getElementById("toggle-password")
      const eyeIcon = document.getElementById("eye-icon")
      const eyeOffIcon = document.getElementById("eye-off-icon")
      const forgotPasswordLink = document.getElementById("forgot-password-link")
      const signupLink = document.getElementById("signup-link")

      // Show registered success banner
      if (registered === "true") {
        successBanner.style.display = "block"
      }

      // Show missing state warning
      if (!state) {
        showError("Missing state in URL. Please start login from VS Code.")
      }

      // Password visibility toggle
      togglePasswordBtn.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password"
        passwordInput.type = isPassword ? "text" : "password"
        eyeIcon.style.display = isPassword ? "none" : "block"
        eyeOffIcon.style.display = isPassword ? "block" : "none"
      })

      // Navigation links
      signupLink.addEventListener("click", (e) => {
        e.preventDefault()
        const signupUrl = state
          ? `signup.html?state=${encodeURIComponent(state)}`
          : "signup.html"
        window.location.href = signupUrl
      })

      forgotPasswordLink.addEventListener("click", async (e) => {
        e.preventDefault()
        const email = emailInput.value.trim()
        if (!email) {
          showError("Please enter your email address first.")
          return
        }
        hideError()
        showStatus("Sending password reset email...")
        const { error } = await supabase.auth.resetPasswordForEmail(email)
        if (error) {
          hideStatus()
          showError(error.message)
          return
        }
        hideStatus()
        successBanner.textContent = "Password reset email sent! Check your inbox."
        successBanner.style.display = "block"
      })

      // Sign in with email/password
      signInBtn.addEventListener("click", signIn)

      // Allow Enter key to submit
      passwordInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") signIn()
      })
      emailInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") passwordInput.focus()
      })

      async function signIn() {
        const email = emailInput.value.trim()
        const password = passwordInput.value
        if (!email || !password) {
          showError("Please enter both email and password.")
          return
        }
        hideError()
        setLoading(true)
        showStatus("Signing in...")

        try {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password })
          if (error) {
            setLoading(false)
            hideStatus()
            showError(error.message)
            return
          }
          await exchangeWithBackend(data.session)
        } catch (err) {
          setLoading(false)
          hideStatus()
          showError(err.message || "An unexpected error occurred.")
        }
      }

      // Sign in with Google
      googleBtn.addEventListener("click", async () => {
        if (!state) {
          showError("Missing state. Please start login from VS Code.")
          return
        }
        hideError()
        showStatus("Redirecting to Google...")
        const redirectTo = `${window.location.origin}${window.location.pathname}?state=${encodeURIComponent(state)}`
        const { error } = await supabase.auth.signInWithOAuth({
          provider: "google",
          options: { redirectTo },
        })
        if (error) {
          hideStatus()
          showError(error.message)
        }
      })

      // Exchange supabase session with backend for authorization code
      async function exchangeWithBackend(session) {
        if (!state) {
          setLoading(false)
          showError("Missing state parameter. Please start login from VS Code.")
          return
        }
        if (!session?.access_token) {
          setLoading(false)
          showError("No session token found.")
          return
        }

        showStatus("Completing authentication...")

        try {
          const res = await fetch(`${API_BASE_URL}/v1/auth/code`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              state,
              supabaseAccessToken: session.access_token,
              supabaseRefreshToken: session.refresh_token,
            }),
          })

          if (res.redirected) {
            window.location.href = res.url
            return
          }

          const data = await res.json().catch(() => ({}))
          if (data.redirect_url) {
            showStatus("Redirecting back to VS Code...")
            window.location.href = data.redirect_url
            return
          }

          setLoading(false)
          hideStatus()
          showError(`Authentication failed: ${data.error || `Server returned ${res.status}`}`)
        } catch (err) {
          setLoading(false)
          hideStatus()
          showError(`Network error: ${err.message}`)
        }
      }

      // Utility functions
      function showError(msg) {
        errorMsg.textContent = msg
        errorMsg.style.display = "block"
      }

      function hideError() {
        errorMsg.style.display = "none"
      }

      function showStatus(msg) {
        statusMsg.innerHTML = `<span class="spinner"></span>${msg}`
        statusMsg.style.display = "block"
      }

      function hideStatus() {
        statusMsg.style.display = "none"
      }

      function setLoading(loading) {
        signInBtn.disabled = loading
        googleBtn.disabled = loading
      }

      // If coming back from OAuth redirect, check for existing session
      supabase.auth.getSession().then(({ data }) => {
        if (data?.session?.access_token && state) {
          setLoading(true)
          exchangeWithBackend(data.session)
        }
      })
    </script>
  </body>
</html>
