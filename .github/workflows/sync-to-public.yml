name: Sync to Public Repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to public repo
        env:
          PAT: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
        run: |
          git remote add public "https://x-access-token:${PAT}@github.com/Axolotl-QA/Axolotl.git"
          git push public main --force
